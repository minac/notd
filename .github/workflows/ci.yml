name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  doctor:
    name: doctor
    # ubuntu-latest with apt-installed Tauri deps. macOS runners are 10×
    # the cost; doctor only runs svelte-check + cargo check, neither of
    # which exercises macOS-specific behavior — that's verified manually.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            cli

      - name: Install npm dependencies
        run: npm ci

      - name: Run doctor
        run: ./run.sh doctor
